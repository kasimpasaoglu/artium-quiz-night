<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="spotlight-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="currentColor" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spotlight-core" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <polygon points="100,0 0,240 200,240" fill="url(#spotlight-fade)"/>
  <circle cx="100" cy="0" r="32" fill="url(#spotlight-core)"/>
</svg>
